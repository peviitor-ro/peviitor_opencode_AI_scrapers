name: OpenCode CLI

on:
  workflow_dispatch:

jobs:
  run-opencode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai

      - name: Create opencode.json
        run: |
          cat > opencode.json << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "opencode/big-pickle"
          }
          EOF

      - name: Run OpenCode command
        run: opencode run "give me the current date"
      - name: Run OpenCode command
        run: opencode run "using repo secrets get the credentials for solr, do not show them in any output and then show me first document from job core from solr runing at https://solr.peviitor.ro"
