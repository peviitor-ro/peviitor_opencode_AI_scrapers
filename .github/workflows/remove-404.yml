name: Remove 404 Jobs

on:
  workflow_dispatch:

jobs:
  validate-urls:
    runs-on: ubuntu-latest

    env:
      SOLR_URL: "https://solr.peviitor.ro/solr/job"
      SOLR_USER: ${{ secrets.SOLR_USER }}
      SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and clean jobs
        run: |
          set -euo pipefail

          TODAY="$(date +%Y-%m-%d)"
          echo "TODAY=${TODAY}"
          echo "SOLR_URL=${SOLR_URL}"

          sudo apt-get update -y
          sudo apt-get install -y jq

          echo "Fetching jobs that were NOT validated today..."
          JOBS_RESPONSE=$(curl -sS -u "${SOLR_USER}:${SOLR_PASSWD}" \
            "${SOLR_URL}/select?q=*:* AND -vdate:${TODAY}&rows=10000&wt=json")

          echo "Raw JOBS_RESPONSE (first 200 chars):"
          echo "$JOBS_RESPONSE" | head -c 200; echo

          NUM_FOUND=$(echo "$JOBS_RESPONSE" | jq '.response.numFound')
          echo "numFound=${NUM_FOUND}"

          if [ "$NUM_FOUND" -eq 0 ]; then
            echo "No jobs to validate (all already validated today)."
            exit 0
          fi

          # Extract urls for docs that have a url (uniqueKey)
          mapfile -t URLS < <(echo "$JOBS_RESPONSE" | jq -r '.response.docs[] | select(.url != null and .url != "") | .url')

          if [ "${#URLS[@]}" -eq 0 ]; then
            echo "Jobs found but none with URL, nothing to test."
            exit 0
          fi

          echo "Testing URLs and building update/delete list..."
          UPDATE_DOCS='['
          FIRST=true

          for URL in "${URLS[@]}"; do
            [ -z "$URL" ] && continue

            echo "Checking $URL"
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")

            if [ "$STATUS_CODE" = "404" ] || [ "$STATUS_CODE" = "410" ] || [ "$STATUS_CODE" = "000" ]; then
              echo "URL invalid (status $STATUS_CODE), scheduling DELETE in Solr."

              # Delete this document by uniqueKey = url
              DOC_UPDATE=$(jq -n --arg url "$URL" '
                { "delete": { "id": $url } }')
            else
              echo "URL OK (status $STATUS_CODE), scheduling vdate update only."

              # Atomic partial update: only vdate is changed
              DOC_UPDATE=$(jq -n --arg url "$URL" --arg today "$TODAY" '
                {
                  "url": $url,
                  "vdate": { "set": $today }
                }')
            fi

            if [ "$FIRST" = true ]; then
              UPDATE_DOCS+="$DOC_UPDATE"
              FIRST=false
            else
              UPDATE_DOCS+=",$DOC_UPDATE"
            fi
          done

          UPDATE_DOCS+=']'

          if [ "$UPDATE_DOCS" = "[]" ]; then
            echo "No jobs to update/delete. Exiting."
            exit 0
          fi

          echo "Final Solr update/delete payload (first 500 chars):"
          echo "$UPDATE_DOCS" | head -c 500; echo

          echo "Sending update/delete batch to Solr..."
          HTTP_CODE=$(curl -sS -u "${SOLR_USER}:${SOLR_PASSWD}" \
            -H "Content-Type: application/json" \
            -X POST \
            --data-binary "$UPDATE_DOCS" \
            -w "%{http_code}" \
            "${SOLR_URL}/update?commit=true" \
            -o /dev/null)

          echo "Solr update HTTP status: $HTTP_CODE"
          if [[ "$HTTP_CODE" =~ ^2[0-9]{2}$ ]]; then
            echo "Update successful."
          else
            echo "Update failed with status $HTTP_CODE"
            exit 1
          fi

          echo "Done."
