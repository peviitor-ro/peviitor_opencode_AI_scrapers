name: Remove 404 Jobs

on:
  workflow_dispatch:

jobs:
  validate-urls:
    runs-on: ubuntu-latest

    env:
      SOLR_URL: "https://solr.peviitor.ro/solr/job"
      SOLR_USER: ${{ secrets.SOLR_USER }}
      SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and remove 404 jobs
        run: |
          set -euo pipefail

          VDATE="$(date +%Y-%m-%d)"
          echo "Using VDATE=${VDATE}"
          echo "SOLR_URL=${SOLR_URL}"

          sudo apt-get update -y
          sudo apt-get install -y jq

          echo "Fetching jobs to validate from Solr..."
          JOBS_RESPONSE=$(curl -sS -u "${SOLR_USER}:${SOLR_PASSWD}" \
            "${SOLR_URL}/select?q=vdate:${VDATE}&rows=5000&fl=id,url&wt=json")

          echo "Raw JOBS_RESPONSE (first 200 chars):"
          echo "$JOBS_RESPONSE" | head -c 200; echo

          NUM_FOUND=$(echo "$JOBS_RESPONSE" | jq '.response.numFound')
          echo "numFound=${NUM_FOUND}"

          if [ "$NUM_FOUND" -eq 0 ]; then
            echo "No jobs found, nothing to do."
            exit 0
          fi

          URLS=$(echo "$JOBS_RESPONSE" | jq -r '.response.docs[].url // empty' 2>/dev/null || echo "")
          if [ -z "$URLS" ]; then
            echo "Jobs found but no URLs, exiting."
            exit 0
          fi

          echo "Testing URLs and building update list..."
          UPDATE_DOCS='['
          FIRST=true

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue

            echo "Checking $URL"
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")

            if [ "$STATUS_CODE" = "404" ] || [ "$STATUS_CODE" = "410" ] || [ "$STATUS_CODE" = "000" ]; then
              echo "URL seems invalid (status $STATUS_CODE), marking job as INACTIVE in Solr."

              JOB_ID=$(echo "$JOBS_RESPONSE" | jq -r --arg url "$URL" '.response.docs[] | select(.url == $url) | .id' 2>/dev/null || echo "")

              if [ -z "$JOB_ID" ]; then
                echo "Warning: Could not find job id for URL $URL, skipping."
                continue
              fi

              DOC_UPDATE=$(jq -n --arg id "$JOB_ID" '
                {
                  "id": $id,
                  "status": { "set": "INACTIVE" }
                }')

              if [ "$FIRST" = true ]; then
                UPDATE_DOCS+="$DOC_UPDATE"
                FIRST=false
              else
                UPDATE_DOCS+=",$DOC_UPDATE"
              fi
            fi
          done <<< "$URLS"

          UPDATE_DOCS+=']'

          if [ "$UPDATE_DOCS" = "[]" ]; then
            echo "No jobs to update. Exiting."
            exit 0
          fi

          echo "Final Solr update payload:"
          echo "$UPDATE_DOCS"

          echo "Sending update to Solr..."
          curl -sS -u "${SOLR_USER}:${SOLR_PASSWD}" \
            -H "Content-Type: application/json" \
            -X POST \
            --data-binary "$UPDATE_DOCS" \
            "${SOLR_URL}/update?commit=true"

          echo "Done."
