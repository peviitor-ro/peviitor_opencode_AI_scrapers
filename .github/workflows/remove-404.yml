name: Remove 404 Jobs

on:
  workflow_dispatch:
    inputs:
      vdate:
        description: 'Validation date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

jobs:
  validate-urls:
    runs-on: ubuntu-latest

    env:
      SOLR_URL: ${{ vars.SOLR_URL }}
      API_URL: ${{ vars.API_URL }}
      API_USER: ${{ secrets.API_USER }}
      API_PASS: ${{ secrets.API_PASS }}
      VDATE: ${{ github.event.inputs.vdate }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and remove 404 jobs
        run: |
          set -euo pipefail

          # Ensure VDATE has a value
          if [ -z "${VDATE:-}" ]; then
            VDATE="$(date +%Y-%m-%d)"
          fi
          echo "Using VDATE=${VDATE}"

          sudo apt-get update -y
          sudo apt-get install -y jq

          # Fetch jobs to validate
          echo "Fetching jobs to validate from Solr..."
          JOBS_RESPONSE=$(curl -sS "${SOLR_URL}/select?q=vdate:${VDATE}%20AND%20status:ACTIVE&rows=5000&fl=id,url&wt=json") || {
            echo "Error: Failed to query Solr for jobs."
            exit 1
          }

          echo "Sample JOBS_RESPONSE:"
          echo "$JOBS_RESPONSE" | head -200

          URLS=$(echo "$JOBS_RESPONSE" | jq -r '.response.docs[].url // empty' 2>/dev/null || echo "")
          if [ -z "$URLS" ]; then
            echo "No jobs found for VDATE=${VDATE}. Exiting."
            exit 0
          fi

          echo "Testing URLs..."
          UPDATE_JSON='['
          FIRST=true

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue

            echo "Checking $URL"
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")

            if [ "$STATUS_CODE" = "404" ] || [ "$STATUS_CODE" = "410" ] || [ "$STATUS_CODE" = "000" ]; then
              echo "URL seems invalid (status $STATUS_CODE), marking job as INACTIVE in Solr."

              JOB_ID=$(echo "$JOBS_RESPONSE" | jq -r --arg url "$URL" '.response.docs[] | select(.url == $url) | .id' 2>/dev/null || echo "")

              if [ -z "$JOB_ID" ]; then
                echo "Warning: Could not find job id for URL $URL, skipping."
                continue
              fi

              EXISTING_DOC=$(curl -sS "${SOLR_URL}/select?q=id:${JOB_ID}&rows=1&wt=json") || {
                echo "Warning: Failed to fetch existing doc for id ${JOB_ID}, skipping."
                continue
              }

              TITLE=$(echo "$EXISTING_DOC"   | jq -r '.response.docs[0].title // empty'
