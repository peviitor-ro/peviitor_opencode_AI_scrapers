name: OpenCode Scraper to Solr

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Company name to scrape'
        required: true
        default: 'EPAM'
        type: string

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        run: |
          wget -q -O /tmp/google-chrome-keyring https://dl-ssl.google.com/linux/linux_signing_key.pub
          sudo mkdir -p /etc/apt/keyrings
          sudo cp /tmp/google-chrome-keyring /etc/apt/keyrings/google-chrome.asc
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.asc] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Start Chrome with remote debugging
        run: |
          google-chrome --remote-debugging-port=9222 --headless --no-sandbox --disable-dev-shm-usage &
          sleep 3

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai

      - name: Copy opencode.json
        run: |
          cp opencode.json opencode.json.bak
          cat > opencode.json << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "opencode/big-pickle",
            "mcp": {
              "chrome-devtools": {
                "type": "local",
                "command": ["npx", "-y", "chrome-devtools-mcp@latest", "--browser-url=http://127.0.0.1:9222"]
              },
              "external-directory": {
                "type": "local",
                "command": ["npx", "-y", "external-directory-mcp@latest"]
              }
            }
          }
          EOF

      - name: Run OpenCode scrape command
        env:
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
        run: |
          set +x
          
          opencode run "
          Context: Running in GitHub Actions with Chrome DevTools MCP (Chrome on port 9222).

          Solr Configuration:
          - Base URL: https://solr.peviitor.ro
          - Jobs endpoint: https://solr.peviitor.ro/job/update/json?commit=true
          - Company endpoint: https://solr.peviitor.ro/solr/company/update/json?commit=true
          - Auth: Use environment variables SOLR_USER and SOLR_PASSWD with curl -u \"\$SOLR_USER:\$SOLR_PASSWD\"
          - NEVER expose credentials in any output

          Task:
          1. Run: /scrape ${{ github.event.inputs.company }}
          2. Extract job data from the company's careers page
          3. Push to https://solr.peviitor.ro (NOT localhost) using the credentials above
          4. Output: number of jobs scraped
          "

      - name: Update Solr company
        env:
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
        run: |
          COMPANY="${{ github.event.inputs.company }}"
          curl -u "$SOLR_USER:$SOLR_PASSWD" \
            -X POST "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
            -H "Content-Type: application/json" \
            -d "[{\"id\": \"$COMPANY\", \"name\": \"$COMPANY\"}]"

      - name: Verify data in Solr
        env:
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
        run: |
          echo "Select data newly added to SOLR and make sure the fields match the job model"
          echo "If you pushed any data to company, make sure they match the company model from"
          echo "github peviitor-ro organization peviitor_core repository"
