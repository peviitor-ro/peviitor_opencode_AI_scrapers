name: OpenCode Scraper to Solr

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Company name to scrape'
        required: true
        default: 'EPAM'
        type: string

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        run: |
          wget -q -O /tmp/google-chrome-keyring https://dl-ssl.google.com/linux/linux_signing_key.pub
          sudo mkdir -p /etc/apt/keyrings
          sudo cp /tmp/google-chrome-keyring /etc/apt/keyrings/google-chrome.asc
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.asc] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Start Chrome with remote debugging
        run: |
          google-chrome --remote-debugging-port=9222 --headless --no-sandbox --disable-dev-shm-usage &
          sleep 3

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai

      - name: Copy opencode.json
        run: |
          cp opencode.json opencode.json.bak
          cat > opencode.json << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "opencode/big-pickle",
            "mcp": {
              "chrome-devtools": {
                "type": "local",
                "command": ["npx", "-y", "chrome-devtools-mcp@latest", "--browser-url=http://127.0.0.1:9222"]
              },
              "external-directory": {
                "type": "local",
                "command": ["npx", "-y", "external-directory-mcp@latest"]
              }
            }
          }
          EOF

      - name: Run OpenCode scrape command
        env:
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
        run: |
          set +x
          
          # Save list of existing files before scraping
          ls -la webscraper/ > /tmp/before_scrape.txt
          
          opencode run "
          You are running in GitHub Actions. You have access to Chrome DevTools MCP connected to Chrome on port 9222.

          IMPORTANT - Solr Configuration:
          - Use SOLR_USER and SOLR_PASSWD environment variables for authentication.
          - Solr URL is: https://solr.peviitor.ro
          - Push jobs to: https://solr.peviitor.ro/job/update/json?commit=true
          - Company core: https://solr.peviitor.ro/solr/company/update/json?commit=true
          - Example: curl -u \"\$SOLR_USER:\$SOLR_PASSWD\" -X POST -H \"Content-Type: application/json\" -d @jobs.json \"https://solr.peviitor.ro/job/update/json?commit=true\"

          Security rules:
          - Do NOT reveal SOLR_USER or SOLR_PASSWD values in any output.
          - Use credentials for Solr operations only.

          Task:
          - Run the /scrape command with the company name: ${{ github.event.inputs.company }}
          - The scrape command will navigate to the company's careers page, extract job data.
          - CRITICAL: When pushing to Solr, use https://solr.peviitor.ro with the credentials from SOLR_USER and SOLR_PASSWD, NOT localhost.
          - Output the final result (number of jobs scraped).
          "

      - name: Check for new scraper files and update Solr
        env:
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
          COMPANY_NAME: "${{ github.event.inputs.company }}"
        run: |
          # Find new files created in webscraper/
          comm -23 <(ls -1 webscraper/*.md | sort) <(cat /tmp/before_scrape.txt | grep webscraper | awk '{print $NF}' | sort) > /tmp/new_files.txt
          
          if [ -s /tmp/new_files.txt ]; then
            SCRAPER_FILE=$(cat /tmp/new_files.txt | head -1)
            SCRAPER_FILE=$(basename "$SCRAPER_FILE")
            echo "New scraper file detected: $SCRAPER_FILE"
            
            # Configure git
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Add and commit the new scraper file
            git add "webscraper/$SCRAPER_FILE"
            git commit -m "Add scraper file: $SCRAPER_FILE" || echo "No changes to commit"
            
            # Push to origin
            git push origin main
            
            # Extract company name from scraper file (remove .md extension)
            COMPANY_FROM_FILE=$(basename "$SCRAPER_FILE" .md)
            echo "Company name from file: $COMPANY_FROM_FILE"
            
            # Query Solr to get the company CUI
            echo "Querying Solr for company CUI..."
            COMPANY_RESPONSE=$(curl -s -u "$SOLR_USER:$SOLR_PASSWD" "https://solr.peviitor.ro/solr/company/select?q=brand:*$COMPANY_FROM_FILE*&rows=1")
            CUI=$(echo "$COMPANY_RESPONSE" | grep -oP '"id":"\K[^"]+' || echo "")
            
            if [ -n "$CUI" ]; then
              echo "Found CUI: $CUI for company $COMPANY_FROM_FILE"
              
              # Atomic add to Solr company core with scraperFile
              TODAY=$(date +%Y-%m-%d)
              curl -u "$SOLR_USER:$SOLR_PASSWD" -X POST "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
                -H "Content-Type: application/json" \
                -d "[{\"id\": \"$CUI\", \"lastScraped\": \"$TODAY\", \"scraperFile\": \"$SCRAPER_FILE\"}]"
              
              echo "Updated Solr company core with scraperFile: $SCRAPER_FILE"
            else
              echo "Company not found in Solr, skipping Solr update"
            fi
          else
            echo "No new scraper file created"
          fi
          In the end select data newly added to SOLR and make sure the fields you pushed to SOLR match the job model and if you pushed any data to company make sure they match to company model from
          github peviitor-ro organization peviitor_core repository
